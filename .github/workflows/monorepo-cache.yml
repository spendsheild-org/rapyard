name: monorepo-cache

on:
  push:
    branches:
      - main

jobs:
  cache:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (24)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cache node_modules for all workspaces
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-modules-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-modules-

      - name: Install root dependencies
        run: npm install --ignore-scripts

      - name: Install workspace dependencies
        run: |
          for f in $(find . -name package.json -not -path "./node_modules/*"); do
            d=$(dirname "$f")
            echo "Installing in $d"
            (cd "$d" && npm install --ignore-scripts || true)
          done


